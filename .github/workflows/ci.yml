name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      SEMGREP_SARIF_FILE: semgrep.sarif
    steps:
      - uses: actions/checkout@v4

      - uses: semgrep/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Ensure semgrep label exists
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'semgrep',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'semgrep',
                color: 'e11d48',
                description: 'Semgrep static analysis findings',
              });
            }

      - name: Create GitHub Issues from findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'semgrep.sarif';

            if (!fs.existsSync(path)) {
              console.log('No SARIF file produced — Semgrep may have found nothing.');
              return;
            }

            const sarif = JSON.parse(fs.readFileSync(path, 'utf8'));
            const results = sarif.runs?.[0]?.results || [];

            if (results.length === 0) {
              console.log('Semgrep: clean scan, no findings.');
              return;
            }

            const sha = context.sha.slice(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            const title = `Semgrep: ${results.length} finding(s) on ${branch} @ ${sha}`;

            const byFile = {};
            for (const r of results) {
              const loc = r.locations?.[0]?.physicalLocation;
              const file = loc?.artifactLocation?.uri || 'unknown';
              const line = loc?.region?.startLine || '?';
              const ruleId = r.ruleId || 'unknown-rule';
              const msg = r.message?.text || 'No description';
              const level = r.level || 'warning';

              if (!byFile[file]) byFile[file] = [];
              byFile[file].push({ ruleId, line, level, msg });
            }

            let body = `## Semgrep Scan Results\n\n`;
            body += `**Commit:** \`${context.sha}\`\n`;
            body += `**Branch:** \`${branch}\`\n`;
            body += `**Findings:** ${results.length}\n\n`;

            for (const [file, findings] of Object.entries(byFile)) {
              body += `### \`${file}\`\n\n`;
              for (const f of findings) {
                body += `- **${f.ruleId}** (${f.level}) — line ${f.line}\n`;
                body += `  ${f.msg}\n\n`;
              }
            }

            body += `---\n*To fix: open Claude Code CLI and ask to fix the open semgrep issues.*\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['semgrep'],
            });

            console.log(`Created issue: ${title}`);
